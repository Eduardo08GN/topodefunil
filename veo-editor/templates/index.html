<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veo Editor By EDDIE</title>
<style>
  :root{
    --bg:#080b10; --surface:#101a22; --surface2:#16222c; --line:rgba(255,255,255,.09);
    --aqua:#18cbb6; --gold:#ebc66a; --ink:#ecf3f1; --dim:#a6b8b6; --mut:#657b7d; --red:#e0524a;
    --amber:#e8a33d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,Segoe UI,sans-serif;padding:28px 20px 60px}
  .wrap{max-width:1180px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:6px}
  h1{font-size:22px;margin:0;font-weight:800}
  h1 b{color:var(--aqua)}
  .watch{font-size:12px;color:var(--mut);margin:4px 0 22px;font-family:ui-monospace,Consolas,monospace}
  .watch em{color:var(--aqua);font-style:normal}
  .contador{font-size:14px;color:var(--dim)}
  .contador b{color:var(--gold);font-size:22px;font-weight:800}

  .cols{display:grid;grid-template-columns:230px 1fr 340px;gap:16px}
  @media(max-width:900px){.cols{grid-template-columns:1fr}}
  .col{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;min-height:260px}
  .col h2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:0 0 12px;font-weight:700}
  .col h2 .n{color:var(--aqua)}

  .item{background:var(--surface2);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:8px;word-break:break-all}
  .item .meta{color:var(--mut);font-size:11px;margin-top:2px}
  .vazio{color:var(--mut);font-size:12.5px;font-style:italic}

  .etapa{color:var(--gold);font-size:13px;font-weight:700;margin-bottom:8px;word-break:break-all}
  .log{background:#05080c;border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    font:12px/1.55 ui-monospace,Consolas,monospace;color:var(--dim);white-space:pre-wrap;
    max-height:260px;overflow:auto}

  .pronto{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:10px;
    padding:9px 12px;margin-bottom:8px;font-size:13px}
  .pronto .nome{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pronto .meta{color:var(--mut);font-size:11px;white-space:nowrap}
  .pronto button{background:var(--aqua);color:#04231f;border:none;border-radius:8px;
    padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer}
  .pronto button:hover{filter:brightness(1.1)}

  .erros{margin-top:16px;background:var(--surface);border:1px solid rgba(224,82,74,.35);border-radius:14px;padding:16px;display:none}
  .erros h2{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin:0 0 12px;font-weight:700}
  .erro-item{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px}
  .erro-item .txt{flex:1;min-width:0}
  .erro-item .msg{color:var(--red);font-size:11.5px;margin-top:2px;word-break:break-all}
  .erro-item button{background:var(--surface);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
  .erro-item button:hover{border-color:var(--aqua);color:var(--aqua)}

  .barra{display:flex;gap:12px;align-items:center;margin-top:16px;flex-wrap:wrap}
  .barra label{font-size:12px;color:var(--dim)}
  select{background:var(--surface2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
  .b-ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
  .b-ghost:hover{border-color:var(--aqua);color:var(--aqua)}

  /* modal player */
  .modal{position:fixed;inset:0;background:rgba(3,6,9,.92);display:none;align-items:center;
    justify-content:center;z-index:50;flex-direction:column;gap:12px}
  .modal.aberto{display:flex}
  .modal video{height:min(86vh,900px);aspect-ratio:9/16;background:#000;border-radius:14px;border:1px solid var(--line)}
  .modal .fechar{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;font-weight:700}
  .modal .fechar:hover{color:var(--ink)}

  /* modo manual */
  details{margin-top:26px}
  summary{cursor:pointer;color:var(--mut);font-size:13px;font-weight:700;user-select:none}
  summary:hover{color:var(--dim)}
  .manual{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:12px;max-width:720px}
  .manual label{display:block;font-size:13px;color:var(--dim);margin:14px 0 6px}
  .manual input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:11px 13px;font-size:14px;outline:none;font-family:inherit}
  .manual .btns{display:flex;gap:12px;margin-top:18px}
  .manual button{border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .manual button:disabled{opacity:.5;cursor:default}
  .b-main{background:linear-gradient(135deg,#18cbb6,#2e9ad6);color:#04231f;flex:1}
  .hint{font-size:12px;color:var(--mut);margin-top:6px;min-height:16px}
  .hint.ok{color:var(--aqua)} .hint.err{color:var(--red)}
  .mlog{margin-top:16px;background:#05080c;border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;font:12.5px/1.55 ui-monospace,Consolas,monospace;color:var(--dim);
    white-space:pre-wrap;max-height:300px;overflow:auto;display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Veo <b>Editor</b> By EDDIE</h1>
    </div>
    <div class="contador"><b id="nProntos">0</b> pronto(s) hoje</div>
  </header>
  <p class="watch" id="watch">esteira iniciando...</p>

  <div class="cols">
    <div class="col">
      <h2>Fila <span class="n" id="nFila"></span></h2>
      <div id="fila"><p class="vazio">Nenhum zip aguardando. Baixe um lote no Flow e ele entra sozinho.</p></div>
    </div>

    <div class="col">
      <h2>Editando agora</h2>
      <div id="atual"><p class="vazio">Esteira ociosa.</p></div>
    </div>

    <div class="col">
      <h2>Prontos hoje</h2>
      <div id="prontos"><p class="vazio">Nada ainda.</p></div>
    </div>
  </div>

  <div class="erros" id="erros">
    <h2>Erros</h2>
    <div id="errosLista"></div>
  </div>

  <div class="barra">
    <label>Precisao</label>
    <select id="cfgModel">
      <option value="base.en">base.en (rapido)</option>
      <option value="small.en">small.en (equilibrado)</option>
      <option value="medium.en">medium.en (preciso, lento)</option>
    </select>
    <label>Silencio</label>
    <select id="cfgMargem">
      <option value="0.15s">0.15s (seco)</option>
      <option value="0.2s" selected>0.2s (padrao)</option>
      <option value="0.35s">0.35s (respiro)</option>
    </select>
    <button class="b-ghost" id="btPasta" type="button">Abrir pasta de prontos</button>
  </div>

  <details>
    <summary>Modo manual (processar uma pasta avulsa)</summary>
    <div class="manual">
      <label>Pasta de ENTRADA (takes ou .zip)</label>
      <input id="entrada" type="text" placeholder="C:\Users\voce\veo_takes" spellcheck="false" />
      <div class="hint" id="hintIn"></div>
      <label>Pasta de SAIDA</label>
      <input id="saida" type="text" placeholder="C:\Users\voce\videos_prontos" spellcheck="false" />
      <div class="btns">
        <button class="b-ghost" id="btInsp" type="button">Inspecionar</button>
        <button class="b-main" id="btProc" type="button">Processar</button>
      </div>
      <div class="mlog" id="mlog"></div>
    </div>
  </details>
</div>

<div class="modal" id="modal">
  <video id="player" controls playsinline preload="metadata"></video>
  <button class="fechar" id="btFechar" type="button">fechar (Esc)</button>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
async function post(url, body){
  const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  return r.json();
}

/* -------- esteira: poll do painel -------- */
let cfgTravada = false;
async function pollEsteira(){
  try{
    const s = await (await fetch('/status')).json();
    $('watch').innerHTML = 'vigiando: ' + s.watch.map(w=>'<em>'+esc(w)+'</em>').join(' &nbsp;+&nbsp; ');

    const fila = $('fila');
    $('nFila').textContent = s.pendentes.length ? '('+s.pendentes.length+')' : '';
    fila.innerHTML = s.pendentes.length
      ? s.pendentes.map(z=>`<div class="item">${esc(z)}</div>`).join('')
      : '<p class="vazio">Nenhum zip aguardando. Baixe um lote no Flow e ele entra sozinho.</p>';

    const at = $('atual');
    if(s.atual){
      at.innerHTML = `<div class="etapa">${esc(s.atual.zip)} — ${esc(s.atual.etapa)}</div>
        <div class="log" id="logAtual">${esc(s.atual.log.join('\n'))}</div>`;
      const l = $('logAtual'); l.scrollTop = l.scrollHeight;
    } else {
      at.innerHTML = '<p class="vazio">Esteira ociosa.</p>';
    }

    $('nProntos').textContent = s.prontos.length;
    $('prontos').innerHTML = s.prontos.length
      ? s.prontos.slice().reverse().map(p=>`
        <div class="pronto">
          <div class="nome">${esc(p.arquivo)}<div class="meta">${p.duracao.toFixed(0)}s · ${p.fator.toFixed(3)}x · ${esc(p.hora)}</div></div>
          <button type="button" onclick="abrirVideo('${esc(p.data)}','${esc(p.arquivo)}')">Ver</button>
        </div>`).join('')
      : '<p class="vazio">Nada ainda.</p>';

    const be = $('erros');
    if(s.erros.length){
      be.style.display='block';
      $('errosLista').innerHTML = s.erros.map(e=>`
        <div class="erro-item">
          <div class="txt">${esc(e.zip)}<div class="msg">${esc(e.erro)}</div></div>
          <button type="button" onclick="retry('${esc(e.zip)}')">Tentar de novo</button>
        </div>`).join('');
    } else { be.style.display='none'; }

    if(!cfgTravada){
      $('cfgModel').value = s.cfg.model;
      $('cfgMargem').value = s.cfg.margem;
      cfgTravada = true;
    }
  }catch(e){ /* app subindo */ }
}
setInterval(pollEsteira, 1500); pollEsteira();

async function retry(zip){ await post('/retry',{zip}); pollEsteira(); }
$('cfgModel').onchange = () => post('/config',{model:$('cfgModel').value});
$('cfgMargem').onchange = () => post('/config',{margem:$('cfgMargem').value});
$('btPasta').onclick = () => post('/abrir-pasta');

/* -------- player -------- */
function abrirVideo(data, arquivo){
  $('player').src = `/video/${data}/${arquivo}`;
  $('modal').classList.add('aberto');
}
function fecharVideo(){
  $('modal').classList.remove('aberto');
  $('player').pause(); $('player').removeAttribute('src'); $('player').load();
}
$('btFechar').onclick = fecharVideo;
$('modal').onclick = e => { if(e.target === $('modal')) fecharVideo(); };
document.addEventListener('keydown', e => { if(e.key === 'Escape') fecharVideo(); });

/* -------- modo manual (legado) -------- */
$('btInsp').onclick = async () => {
  const h = $('hintIn'); h.className='hint'; h.textContent='verificando...';
  const r = await post('/inspecionar',{entrada:$('entrada').value});
  h.className = 'hint ' + (r.ok?'ok':'err');
  h.textContent = r.ok ? `OK: ${r.modo}` + (r.takes?` — ${r.takes} takes`:'') : r.msg;
};
let mtimer=null;
$('btProc').onclick = async () => {
  const r = await post('/processar',{entrada:$('entrada').value,saida:$('saida').value,
    model:$('cfgModel').value,margem:$('cfgMargem').value});
  if(!r.ok){ const h=$('hintIn'); h.className='hint err'; h.textContent=r.msg; return; }
  $('btProc').disabled=true; $('btInsp').disabled=true;
  $('mlog').style.display='block';
  if(mtimer) clearInterval(mtimer);
  mtimer = setInterval(pollManual, 900); pollManual();
};
async function pollManual(){
  const s = await (await fetch('/manual/status')).json();
  const log=$('mlog');
  log.textContent = (s.running?'processando...\n\n':'') + s.log.join('\n');
  log.scrollTop = log.scrollHeight;
  if(!s.running){
    clearInterval(mtimer); mtimer=null;
    $('btProc').disabled=false; $('btInsp').disabled=false;
  }
}
</script>
</body>
</html>
